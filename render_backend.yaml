services:
  - type: web
    name: reclab-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://reclab-frontend.onrender.com
      - key: FLASK_API_URL
        value: https://reclab-api.onrender.com
