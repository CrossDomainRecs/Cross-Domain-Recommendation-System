# Render Blueprint for RecLab Deployment
services:
  # 1. Flask ML API Service
  - type: web
    name: reclab-ml-api
    runtime: python
    region: oregon
    plan: free
    branch: production
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 src.api.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: WEAVIATE_URL
        sync: false
      - key: WEAVIATE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: OMDB_API_KEY
        sync: false
    healthCheckPath: /api/health
    
  # 2. Node.js Backend Service  
  - type: web
    name: reclab-backend
    runtime: node
    region: oregon
    plan: free
    branch: production
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FLASK_API_URL
        fromService:
          type: web
          name: reclab-ml-api
          envVarKey: RENDER_EXTERNAL_URL
    healthCheckPath: /health

  # 3. React Frontend (Static Site)
  - type: web
    name: reclab-frontend
    runtime: static
    region: oregon
    plan: free
    branch: production
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: reclab-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_ML_API_URL
        fromService:
          type: web
          name: reclab-ml-api
          envVarKey: RENDER_EXTERNAL_URL
